name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose
        run: docker compose config --quiet

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build shared packages
        run: pnpm turbo run build --filter='./packages/*'
      - name: Typecheck workspace packages
        run: pnpm turbo run typecheck --filter='./packages/*'
      - name: Lint dashboard
        run: pnpm --dir apps/dashboard lint

  gateway-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install gateway dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r apps/worker-gateway/requirements-dev.txt
      - name: Run gateway tests
        run: python -m pytest apps/worker-gateway/tests -v --tb=short
