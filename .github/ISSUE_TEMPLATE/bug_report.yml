name: Bug report
description: Report a reproducible bug or regression
title: "[Bug] "
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: A short description of the bug.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - apps/dashboard
        - apps/worker-gateway
        - services/paperclip
        - services/litellm
        - services/gmail-mcp
        - infra/docker-compose
        - docs
        - other
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest set of steps that reproduces the issue.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Docker version, browser, provider/model, or anything else relevant.
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste only the relevant parts and redact secrets.
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checklist
      options:
        - label: I searched existing issues and did not find a duplicate
          required: true
        - label: I removed secrets and private data from logs and screenshots
          required: true
